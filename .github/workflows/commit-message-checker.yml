---
name: 'Commit message check'

on:
  pull_request:
  push:
    branches:
      # we must not fix commit messages when they already reached main
      - '!main'

permissions:
  contents: read
jobs:
  check-commit-message:
    secrets:
      accessToken: "${{ secrets.GITHUB_TOKEN }}"
    uses: os-autoinst/os-autoinst-common/.github/workflows/base-commit-message-checker.yml@e9a35c74028cb8f1e64a4d787d5751dd7b0790c8  # master
